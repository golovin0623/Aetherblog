# =============================================================================
# AetherBlog Development Configuration
# =============================================================================
# WARNING: This file contains DEVELOPMENT DEFAULTS only.
# In production, ALL sensitive values must be set via environment variables:
#   - JWT_SECRET (required, min 32 chars)
#   - AETHERBLOG_DATABASE_PASSWORD
#   - REDIS_PASSWORD
# DO NOT use these values in production deployments.
# =============================================================================

server:
  port: 8080
  host: "0.0.0.0"

database:
  host: localhost
  port: 5432
  user: aetherblog
  password: aetherblog123
  dbname: aetherblog
  sslmode: disable  # DEV ONLY — production should set AETHERBLOG_DATABASE_SSLMODE=require
  max_open_conns: 20
  max_idle_conns: 5

redis:
  host: localhost
  port: 6379
  password: "aetherblog_dev"
  db: 0

jwt:
  # secret: ""  # REQUIRED: set JWT_SECRET env var (min 32 chars)
  expiration: 24h
  refresh_expiration: 168h  # 7 days

auth:
  cookie:
    secure: false
    same_site: Strict

cors:
  allowed_origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
    - http://localhost:7894
    - http://127.0.0.1:7894
    - http://localhost:7899
    - http://127.0.0.1:7899

upload:
  path: ./uploads
  url_prefix: /uploads

media:
  trash_cleanup_days: 120

log:
  path: ./logs
  level: debug

ai:
  base_url: http://localhost:8000
  connect_timeout: 5s
  read_timeout: 30s
  stream_read_timeout: 5m

elasticsearch:
  uris:
    - http://localhost:9200
