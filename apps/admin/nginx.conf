# SECURITY (VULN-126): 隐藏 nginx 版本号。
server_tokens off;

server {
    # SECURITY (VULN-124): unprivileged nginx image cannot bind <1024 — use 8080.
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SECURITY (VULN-149): admin 后台直连路径（`ADMIN_PORT` 暴露时）也必须带基础
    # 安全响应头。历史上这里只靠 gateway 的 security-headers.conf 覆盖，直连 :7894
    # 或容器内网直达时会裸奔。下面的头集合保持与 gateway 的 security-headers.conf
    # 一致 —— 任何修改需要同步两处。
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # NOTE: 保持与 nginx/nginx.conf $csp_header map 一致 (见该文件第 29 行注释)。
    # admin 后台用 CDN <link> 加载图标字体（jsdelivr）和 Google Fonts，故 style-src
    # 与 font-src 需显式放行对应源；否则浏览器对 gateway + admin 两份 CSP 取交集后
    # 仍拦截动态注入的 <link>。2026-04-17 PR #459 漏同步本行导致 /admin/ 字体被拦。
    # 'wasm-unsafe-eval' 与 gateway 保持一致——Shiki/Oniguruma WASM 在编辑器预览
    # 和文章详情页都用到，缺失会导致高亮初始化静默失败。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Handle Admin assets specifically (with caching)
    # ^~ prevents regex locations from taking precedence
    location ^~ /admin/assets/ {
        rewrite ^/admin/(.*)$ /$1 break;
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle Admin SPA routing and other /admin paths
    location ^~ /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # SPA fallback - all routes go to index.html (direct access)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy - forward to backend service
    location /api {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
