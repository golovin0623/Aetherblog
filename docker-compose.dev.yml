# =============================================================================
# AetherBlog - 本地开发环境 Docker Compose
# =============================================================================
# 仅启动基础中间件 + Nginx 网关
# 后端、AI 服务、前端在宿主机本地运行
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 数据库
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: aetherblog-postgres
    # SECURITY (VULN-118): 即便是 dev compose，也不再自带默认口令 —— 强制开发者
    # 在 .env 里显式设置 DB_PASSWORD。避免从 env.example 迁出的旧密码悄悄继续生效。
    environment:
      POSTGRES_DB: aetherblog
      POSTGRES_USER: aetherblog
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD env var is required (set in .env)}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # VULN-122 dev 回退：恢复全接口绑定以支持手机/局域网真机调试
      # (CLAUDE.md §移动端真机调试 依赖此行为)。
      - "${DB_PORT:-5432}:5432"
    volumes:
      - aetherblog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetherblog -d aetherblog"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 缓存
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: aetherblog-redis
    # SECURITY (VULN-118/119 dev): 要求 REDIS_PASSWORD，避免本地 dev 实例
    # 跑裸口令 Redis。如需匿名 Redis（仅容器内测），在 .env 显式设 REDIS_PASSWORD=dev-only-not-secret。
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD env var is required}"]
    ports:
      # VULN-122 dev 回退：恢复全接口绑定以支持跨主机联调。Redis 仍设 requirepass。
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - aetherblog_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx 网关 (连接宿主机服务)
  # ---------------------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: aetherblog-gateway-dev
    ports:
      - "${GATEWAY_PORT:-7899}:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  aetherblog_postgres_data:
  aetherblog_redis_data:
