# =============================================================================
# AetherBlog Nginx Gateway - 本地开发配置
# =============================================================================
# 使用 host.docker.internal 连接宿主机上运行的服务
# =============================================================================

# WebSocket 连接升级映射
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;
    
    # 客户端请求体大小限制 (常规请求上限50MB)
    client_max_body_size 50m;
    
    # 代理缓冲 (关闭以支持 SSE)
    proxy_buffering off;
    
    # 通用代理头
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    
    # HTTP/1.1 支持 keepalive
    proxy_http_version 1.1;

    # =========================================================================
    # 安全响应头 (Security Headers)
    # =========================================================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Basic CSP — adjust as needed
    # Dev mode: allow Google Fonts, Vite HMR WebSocket, and blob: for images
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; connect-src 'self' ws://localhost:5173 ws://localhost:3000; frame-ancestors 'self'" always;

    # Uncomment if using HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =========================================================================
    # 后台管理 /admin (Vite dev server on host:5173)
    # =========================================================================
    location = /admin {
        return 301 /admin/;
    }
    
    # Admin 应用 - 保持 /admin/ 路径前缀
    location /admin/ {
        proxy_pass http://host.docker.internal:5173;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    
    # Vite HMR WebSocket
    location /@vite/ {
        proxy_pass http://host.docker.internal:5173/@vite/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    
    # Vite React Refresh (HMR for React)
    location /@react-refresh {
        proxy_pass http://host.docker.internal:5173/@react-refresh;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    
    # Vite module resolution
    location /@id/ {
        proxy_pass http://host.docker.internal:5173/@id/;
    }
    
    # Vite source files (for HMR)
    location /src/ {
        proxy_pass http://host.docker.internal:5173/src/;
    }
    
    location /@fs/ {
        proxy_pass http://host.docker.internal:5173/@fs/;
    }
    
    location /node_modules/ {
        proxy_pass http://host.docker.internal:5173/node_modules/;
    }

    # =========================================================================
    # AI 服务 (Python FastAPI on host:8000)
    # =========================================================================
    location ^~ /api/v1/ai/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        add_header X-Accel-Buffering no;
    }

    location ^~ /api/v1/admin/providers {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Connection "";
    }

    # 搜索管理/公开接口：长超时以兼容旧版同步响应与 SSE QA 流
    # 注意: 这里 prefix 不能带尾斜杠 —— nginx 对 `^~ /path/` 遇到无尾斜杠的
    # `/path` 请求会 301 补斜杠, 而 Go backend 的路由注册在 `/search` (无斜杠)
    # 上, 301 后的 `/search/` 会被 backend 返回 404. 用无尾斜杠前缀即可匹配
    # `/search` 与 `/search/sub` 两种形式, 不触发 301 重写.
    location ^~ /api/v1/admin/search {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_buffering off;
    }
    location ^~ /api/v1/public/search {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_buffering off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # =========================================================================
    # 用户上传文件 (本地存储 /uploads/* → backend /api/uploads/*)
    # =========================================================================
    location /uploads/ {
        proxy_pass http://host.docker.internal:8080/api/uploads/;
        proxy_set_header Connection "";
        expires 7d;
        add_header Cache-Control "public";
    }

    # =========================================================================
    # 文件上传 (媒体上传最大2GB)
    # =========================================================================
    location ~ ^/api/(upload|media|file) {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Connection "";

        # 大文件上传配置 (最大10GB)
        client_max_body_size 10G;
        client_body_buffer_size 100M;

        # 上传超时 (大文件需要更长时间, 1小时)
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # 禁用请求体缓冲，边收边传
        proxy_request_buffering off;
    }

    # =========================================================================
    # 后端 API (Go backend on host:8080)
    # =========================================================================
    location /api {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # =========================================================================
    # 博客前台 (Next.js dev server on host:3000)
    # =========================================================================
    location /_next/webpack-hmr {
        proxy_pass http://host.docker.internal:3000/_next/webpack-hmr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # =========================================================================
    # 健康检查
    # =========================================================================
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
