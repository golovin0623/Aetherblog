# =============================================================================
# AetherBlog Nginx Gateway - 生产级配置
# =============================================================================
# 支持特性:
#   ✅ WebSocket 长连接 (AI 实时对话)
#   ✅ SSE 流式传输 (AI 流式响应)
#   ✅ 大文件上传 (图片/视频 最大10GB, 媒体上传路径)
#   ✅ 长时间请求 (多轮 AI 工具调用，最长10分钟)
#   ✅ 连接池优化
# =============================================================================

# WebSocket 连接升级映射 (必须在 server 块之前)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# SECURITY (VULN-127): HSTS 只在 HTTPS 生效。这里用 map 让反代处于 HTTPS 时
# 才输出 Strict-Transport-Security；HTTP 请求输出空字符串，避免浏览器把 HTTP
# 站点强制 pin 成 HTTPS（那样本地 http 调试会断）。
map $scheme $hsts_header {
    https    "max-age=63072000; includeSubDomains; preload";
    default  "";
}

# SECURITY (VULN-128): CSP via map — 统一一次改动影响所有 include security-headers.conf
# 的 location。去掉 'unsafe-eval'，保留 'unsafe-inline' (Next.js 15 生产构建
# 所需；nonce 方案为 P3 后续)。
#
# 'wasm-unsafe-eval' —— 博客文章详情页通过 Shiki (Oniguruma WASM) 做语法高亮，
# WASM 实例化需要此指令；否则 getHighlighter() 静默失败，MarkdownRenderer
# 的 visibility:hidden 封装永远不会切回 visible，用户看到空白正文。
# 注意：'wasm-unsafe-eval' 只放行 WebAssembly.compile/instantiate，不等同于
# 'unsafe-eval'（后者会放行 eval/new Function）。
map $request_uri $csp_header {
    # blog 的 article font 切换功能会动态注入 <link href="fonts.googleapis.com">；
    # admin 的图标/字体 CDN 也走 jsdelivr。两处都要显式放行，否则浏览器拦 style 并
    # 导致 React 水合失败。dev 配置 (nginx.dev.conf) 早已这样放行，prod 之前漏了。
    default "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https:; media-src 'self' blob:; frame-ancestors 'none'; base-uri 'self';";
}

# SECURITY (VULN-125): edge rate limiting — 多分区分别限制 login/AI/通用 API
# 突发流量。跟后端 Redis 限流双层防护：边缘挡住无认证洪流，后端 Redis 精细
# 控制 per-user 额度。
limit_req_zone $binary_remote_addr zone=edge_api:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=edge_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=edge_ai:10m    rate=10r/m;
limit_conn_zone $binary_remote_addr zone=edge_conn:10m;

# SECURITY (VULN-126): 隐藏 nginx 版本号，减少信息泄露供攻击者定位 CVE。
server_tokens off;

# Docker DNS (supports scaled services)
resolver 127.0.0.11 valid=10s;

# 上游服务定义
# SECURITY (VULN-148): max_fails / fail_timeout 让 nginx 在上游连续失败时短暂摘
# 掉节点，避免把大量流量打到已故障的容器上放大告警延迟 & 阻塞 worker。单机
# docker 部署只有一个节点，但保留声明，未来扩容为多副本时无需再改。
upstream blog {
    server blog:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream admin {
    # SECURITY (VULN-124): admin container now runs nginx-unprivileged on :8080.
    server admin:8080 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream backend {
    server backend:8080 max_fails=3 fail_timeout=10s;
    keepalive 64;  # AI 服务需要更多连接
}

upstream ai_service {
    server ai-service:8000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80;
    server_name _;
    
    # =========================================================================
    # 基础配置
    # =========================================================================
    
    # 客户端请求体大小限制 (常规请求上限50MB)
    client_max_body_size 50m;

    # 请求体缓冲
    client_body_buffer_size 1M;
    client_body_timeout 60s;

    # 响应超时
    send_timeout 60s;

    # =========================================================================
    # 安全响应头（通过 include 复用，避免子 location 覆盖丢失）
    # =========================================================================
    include /etc/nginx/security-headers.conf;
    
    # 代理缓冲 (关闭以支持 SSE)
    proxy_buffering off;
    
    # 通用代理头
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    
    # HTTP/1.1 支持 keepalive
    proxy_http_version 1.1;

    # =========================================================================
    # 后台管理 /admin (已配置 base: '/admin/')
    # =========================================================================
    # 重要: /admin/ 结尾的 location 配合 proxy_pass 确保路径正确传递
    # 访问 /admin 会被 301 重定向到 /admin/，确保 React Router 正常工作
    location = /admin {
        return 301 /admin/;
    }
    
    location /admin/ {
        proxy_pass http://admin/admin/;
        proxy_set_header Connection "";
        
        # 支持 SPA 刷新 (由 admin 容器的 nginx 处理 try_files)
        proxy_intercept_errors off;
    }
    
    # Admin 静态资源 (/admin/assets/*)
    location /admin/assets/ {
        proxy_pass http://admin/admin/assets/;
        proxy_set_header Connection "";
        
        # 静态资源缓存
        expires 1d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }


    # =========================================================================
    # AI 流式响应 (NDJSON/SSE)
    # 匹配: /api/v1/ai/*, /api/chat/*, /api/stream/*
    # SECURITY (VULN-125): 边缘 AI 限流 10r/min burst=5，保护 provider 账单。
    # 后端 rate_limiter 仍然生效（fail-closed VULN-070），双层防护。
    # =========================================================================
    location ^~ /api/v1/ai/ {
        limit_req zone=edge_ai burst=5 nodelay;
        limit_conn edge_conn 4;

        proxy_pass http://ai_service;

        # 流式响应配置 (NDJSON/SSE)
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        # 长时间超时 (AI 可能处理很久)
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 禁用缓冲，确保实时传输
        chunked_transfer_encoding on;

        # 流式特定头
        add_header X-Accel-Buffering no;
        include /etc/nginx/security-headers.conf;
    }

    location ^~ /api/v1/admin/providers {
        proxy_pass http://ai_service;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # =========================================================================
    # 搜索管理接口 (backend) - 索引/重建/重试等可能耗时较久
    # 虽然后端已改为异步 goroutine + 立即返回，但保留长超时以防未来新增同步管理接口；
    # 同时也兼容历史/降级场景下的同步响应。
    # =========================================================================
    location ^~ /api/v1/admin/search/ {
        proxy_pass http://backend;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_buffering off;
        include /etc/nginx/security-headers.conf;
    }
    location ^~ /api/v1/public/search/ {
        proxy_pass http://backend;
        proxy_set_header Connection "";

        # 公开搜索（含 SSE QA 流）
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_buffering off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
        include /etc/nginx/security-headers.conf;
    }
    location ~ ^/api/(ai|chat|stream) {
        proxy_pass http://backend;
        
        # SSE 必需配置
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        
        # 长时间超时 (AI 可能处理很久)
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;     # 10分钟
        proxy_read_timeout 600s;     # 10分钟
        
        # 禁用缓冲，确保实时传输
        chunked_transfer_encoding on;
        
        # SSE 特定头
        add_header X-Accel-Buffering no;
        include /etc/nginx/security-headers.conf;
    }
    
    # =========================================================================
    # WebSocket 连接 (实时 AI 对话)
    # 匹配: /api/ws/*, /api/websocket/*, /api/socket/*
    # =========================================================================
    location ~ ^/api/(ws|websocket|socket) {
        proxy_pass http://backend;
        
        # WebSocket 升级
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # WebSocket 长连接超时 (1小时)
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        # 禁用缓冲
        proxy_buffering off;
    }
    
    # =========================================================================
    # 文件上传 (图片/视频)
    # 匹配: /api/upload/*, /api/media/*, /api/file/*
    # =========================================================================
    # VULN-130 回退：恢复 10GB 上传额度（超大素材/备份上传场景）。网关不再
    # 作为资源耗尽的前置闸门——由后端限流 + 磁盘配额 + IP 限速（edge_api zone）
    # 共同承担防护职责。如果确认不再需要 >2GB 上传，单独改此处即可。
    location ~ ^/api/(upload|media|file) {
        proxy_pass http://backend;
        proxy_set_header Connection "";

        client_max_body_size 10G;
        client_body_buffer_size 16M;

        # 上传超时 (大文件需要更长时间, 1小时)
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;


        # 禁用请求体缓冲，边收边传
        proxy_request_buffering off;
    }
    
    # =========================================================================
    # 用户上传文件 (本地存储 /uploads/* → backend /api/uploads/*)
    # SECURITY (VULN-049):
    #   - X-Content-Type-Options: nosniff 防止浏览器根据魔数嗅探执行 HTML/JS；
    #   - 对 .svg / .html / .xml 强制下载 (Content-Disposition: attachment)
    #     避免同源下执行内联脚本 (VULN-030 历史问题的网关兜底)；
    #   - restrictive CSP 阻止执行任何内联资源。
    # =========================================================================
    location /uploads/ {
        proxy_pass http://backend/api/uploads/;
        proxy_set_header Connection "";

        # 图片/视频静态文件可以缓存
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        include /etc/nginx/security-headers.conf;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 强制把潜在可脚本文件作为附件返回 (匹配放在通用 /uploads/ 之前的更具体模式)。
    # NOTE: regex location 里 proxy_pass 不能带 URI（nginx 语法限制），所以改用
    # rewrite ... break 先把 /uploads/* 改写成 /api/uploads/*，再 proxy_pass 到
    # upstream 根，保持与同文件上方 prefix 版本一致的路径转发效果。
    location ~ ^/uploads/.+\.(svg|svgz|xml|html|htm)$ {
        rewrite ^/uploads/(.*)$ /api/uploads/$1 break;
        proxy_pass http://backend;
        proxy_set_header Connection "";

        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Disposition "attachment" always;
        add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline'" always;
        include /etc/nginx/security-headers.conf;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =========================================================================
    # 登录接口边缘限流 (VULN-125)：防爆破。后端 RateLimitByIP 保留作为精细层。
    # =========================================================================
    location = /api/v1/auth/login {
        limit_req zone=edge_login burst=3 nodelay;
        proxy_pass http://backend;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =========================================================================
    # 后端 API - 常规请求 (兜底)
    # SECURITY (VULN-125): 边缘通用限流 30r/s burst=20 + 每 IP 50 并发连接，
    # 防爬虫/扫描器；正常浏览器使用不会触发。
    # =========================================================================
    location /api {
        limit_req zone=edge_api burst=20 nodelay;
        limit_conn edge_conn 50;

        proxy_pass http://backend;
        proxy_set_header Connection "";

        # 常规 API 超时
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # =========================================================================
    # Next.js 静态资源 (强缓存)
    # =========================================================================
    location /_next/static {
        proxy_pass http://blog;
        proxy_set_header Connection "";
        
        # 强缓存 1年
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }
    
    # =========================================================================
    # 博客前台 (默认)
    # =========================================================================
    location / {
        proxy_pass http://blog;
        
        # 支持 WebSocket (Next.js HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # 常规超时
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =========================================================================
    # 健康检查
    # =========================================================================
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
        include /etc/nginx/security-headers.conf;
    }
    
    # 错误页面
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
