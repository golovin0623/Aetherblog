# 安全响应头 — 通过 include 在所有 location 中复用，
# 避免 nginx add_header 继承被子 location 覆盖的问题。
#
# 此文件需要在 server 块内 `include` (非 http 块)。依赖变量 $hsts_header
# 和 $csp_header，这两个变量必须在 nginx.conf 的 http 上下文通过 `map` 定义。

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "0" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

# SECURITY (VULN-128): 移除 `'unsafe-eval'`。Next.js 15 生产打包不需要 eval；
# 历史上放行是为了兼容 mermaid/shiki 的动态 import，但那条链路已走
# `dangerouslySetInnerHTML` 净化路径，eval 放行已无必要。
# `'unsafe-inline'` 仍保留 —— Next.js 生成的 style 依赖 inline style，nonce
# 方案需要 middleware 级改造（跟踪为 P3 后续）。
add_header Content-Security-Policy $csp_header always;

# SECURITY (VULN-127): HSTS via $hsts_header — 在 nginx.conf 里用
# `map $scheme $hsts_header { https "max-age=..."; default ""; }`
# 保证 HTTP 访问时不会注入该头（否则浏览器永久 pin 住导致本地 http 断网）。
add_header Strict-Transport-Security $hsts_header always;
