# 安全响应头 — 通过 include 在所有 location 中复用，
# 避免 nginx add_header 继承被子 location 覆盖的问题。
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "0" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https:; media-src 'self' blob:; frame-ancestors 'none';" always;
# HSTS — only effective over HTTPS; include this line only in TLS server blocks.
# Sending it over plain HTTP will cause browsers to pin the domain to HTTPS,
# breaking HTTP-only access (e.g. local dev on port 7899).
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
