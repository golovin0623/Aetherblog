name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# 并发控制: PR 阶段取消旧运行节省资源；main/develop 分支排队等待，避免构建产物丢失
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME || 'golovin0623' }}

jobs:
  # ===========================================================================
  # 变更检测: 最先运行，决定后续哪些 job 需要执行
  # ===========================================================================
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai-service: ${{ steps.filter.outputs.ai-service }}
      blog: ${{ steps.filter.outputs.blog }}
      admin: ${{ steps.filter.outputs.admin }}
      frontend: ${{ steps.check.outputs.frontend }}
      any_changed: ${{ steps.check.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/server/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci-cd.yml'
            ai-service:
              - 'apps/ai-service/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci-cd.yml'
            blog:
              - 'apps/blog/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'docker-compose*.yml'
              - '.github/workflows/ci-cd.yml'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'docker-compose*.yml'
              - '.github/workflows/ci-cd.yml'

      - name: Compute aggregate flags
        id: check
        run: |
          # 前端聚合标志: blog 或 admin 任一变更
          if [[ "${{ steps.filter.outputs.blog }}" == "true" || \
                "${{ steps.filter.outputs.admin }}" == "true" ]]; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          # 任意模块变更标志
          if [[ "${{ steps.filter.outputs.backend }}" == "true" || \
                "${{ steps.filter.outputs.ai-service }}" == "true" || \
                "${{ steps.filter.outputs.blog }}" == "true" || \
                "${{ steps.filter.outputs.admin }}" == "true" ]]; then
            echo "any_changed=true" >> $GITHUB_OUTPUT
          else
            echo "any_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Print change detection results
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 变更检测结果:"
          echo "  backend:    ${{ steps.filter.outputs.backend }}"
          echo "  ai-service: ${{ steps.filter.outputs.ai-service }}"
          echo "  blog:       ${{ steps.filter.outputs.blog }}"
          echo "  admin:      ${{ steps.filter.outputs.admin }}"
          echo "  frontend:   ${{ steps.check.outputs.frontend }}"
          echo "  any_changed: ${{ steps.check.outputs.any_changed }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ===========================================================================
  # Docker 配置验证 (与 detect-changes 并行)
  # ===========================================================================
  config-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.prod.yml config --quiet
          echo "✅ Docker Compose files are valid"

  # ===========================================================================
  # 前端质量检查: lint + typecheck (仅当前端代码变更时)
  # PR 阶段到此为止，不跑 build
  # ===========================================================================
  frontend-quality:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: |
          pnpm --filter @aetherblog/admin typecheck
          pnpm --filter @aetherblog/blog typecheck

  # ===========================================================================
  # 后端测试 (仅当后端代码变更时)
  # ===========================================================================
  backend-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: apps/server
        run: mvn clean install -DskipTests

      - name: Run tests
        working-directory: apps/server
        run: mvn test

  # ===========================================================================
  # AI 服务测试 (仅当 AI 服务代码变更时)
  # ===========================================================================
  ai-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install dependencies
        working-directory: apps/ai-service
        run: pip install -r requirements.txt

      - name: Python syntax check
        working-directory: apps/ai-service
        run: |
          python -m py_compile app/main.py
          find app -name "*.py" -exec python -m py_compile {} \;

      - name: Run linting
        working-directory: apps/ai-service
        run: |
          pip install ruff
          ruff check .

      - name: Verify app can start
        working-directory: apps/ai-service
        env:
          AI_ENV: test
          AI_MOCK_MODE: "true"
          JWT_SECRET: "ci-test-secret"
          POSTGRES_DSN: "postgresql://test:test@localhost:5432/test_db"
        run: |
          python -c "from app.main import app; print('✅ App imports successfully')"

  # ===========================================================================
  # 条件性 Docker 构建: 仅 push to main 且模块有变更时触发
  # ===========================================================================
  build-backend:
    needs: [detect-changes, backend-test]
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/aetherblog-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-backend:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-backend:buildcache,mode=max
          platforms: linux/amd64

  build-ai-service:
    needs: [detect-changes, ai-test]
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.detect-changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/aetherblog-ai-service
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/ai-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-ai-service:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-ai-service:buildcache,mode=max
          platforms: linux/amd64

  build-blog:
    needs: [detect-changes, frontend-quality]
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.detect-changes.outputs.blog == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/aetherblog-blog
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/blog/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-blog:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-blog:buildcache,mode=max
          platforms: linux/amd64

  build-admin:
    needs: [detect-changes, frontend-quality]
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.detect-changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/aetherblog-admin
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-admin:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-admin:buildcache,mode=max
          platforms: linux/amd64

  # ===========================================================================
  # 自动部署到服务器 (Webhook 触发)
  # ===========================================================================
  deploy:
    needs: [detect-changes, config-validate, build-backend, build-ai-service, build-blog, build-admin]
    # 即使部分 build job 被跳过也能运行，但至少有一个模块被构建才触发部署
    if: |
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.detect-changes.outputs.any_changed == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Print deployment info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 触发部署 - 以下模块已更新:"
          [[ "${{ needs.detect-changes.outputs.backend }}" == "true" ]] && echo "  ✅ backend"
          [[ "${{ needs.detect-changes.outputs.ai-service }}" == "true" ]] && echo "  ✅ ai-service"
          [[ "${{ needs.detect-changes.outputs.blog }}" == "true" ]] && echo "  ✅ blog"
          [[ "${{ needs.detect-changes.outputs.admin }}" == "true" ]] && echo "  ✅ admin"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Trigger deployment webhook
        run: |
          set -euo pipefail

          response_file=$(mktemp)
          http_code=$(curl -sS -X POST \
            --max-time 900 \
            --connect-timeout 10 \
            --retry 2 \
            --retry-delay 2 \
            --retry-connrefused \
            -o "$response_file" \
            -w "%{http_code}" \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}")

          echo "Webhook HTTP status: $http_code"
          echo "Webhook response:"
          cat "$response_file"

          if [ "$http_code" != "200" ]; then
            echo "❌ Deployment failed, webhook status: $http_code"
            exit 1
          fi

          echo "✅ Deployment completed successfully"
