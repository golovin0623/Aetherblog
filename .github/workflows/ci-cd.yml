name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

# 并发控制: PR 阶段取消旧运行节省资源；main/develop 分支排队等待，避免构建产物丢失
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME || 'golovin0623' }}

jobs:
  # ===========================================================================
  # 变更检测: 最先运行，决定后续哪些 job 需要执行
  # ===========================================================================
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai-service: ${{ steps.filter.outputs.ai-service }}
      blog: ${{ steps.filter.outputs.blog }}
      admin: ${{ steps.filter.outputs.admin }}
      frontend: ${{ steps.check.outputs.frontend }}
      any_changed: ${{ steps.check.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/server-go/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci-cd.yml'
            ai-service:
              - 'apps/ai-service/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci-cd.yml'
            blog:
              - 'apps/blog/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'docker-compose*.yml'
              - '.github/workflows/ci-cd.yml'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'docker-compose*.yml'
              - '.github/workflows/ci-cd.yml'

      - name: Compute aggregate flags
        id: check
        run: |
          # Tag 推送时全量构建，所有标志置为 true
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "any_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 前端聚合标志: blog 或 admin 任一变更
          if [[ "${{ steps.filter.outputs.blog }}" == "true" || \
                "${{ steps.filter.outputs.admin }}" == "true" ]]; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          # 任意模块变更标志
          if [[ "${{ steps.filter.outputs.backend }}" == "true" || \
                "${{ steps.filter.outputs.ai-service }}" == "true" || \
                "${{ steps.filter.outputs.blog }}" == "true" || \
                "${{ steps.filter.outputs.admin }}" == "true" ]]; then
            echo "any_changed=true" >> $GITHUB_OUTPUT
          else
            echo "any_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Print change detection results
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 变更检测结果:"
          echo "  backend:    ${{ steps.filter.outputs.backend }}"
          echo "  ai-service: ${{ steps.filter.outputs.ai-service }}"
          echo "  blog:       ${{ steps.filter.outputs.blog }}"
          echo "  admin:      ${{ steps.filter.outputs.admin }}"
          echo "  frontend:   ${{ steps.check.outputs.frontend }}"
          echo "  any_changed: ${{ steps.check.outputs.any_changed }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ===========================================================================
  # 密钥与默认值守门 (VULN-117): 阻止已知弱口令/Mock 密钥被提交到代码
  # ===========================================================================
  forbidden-defaults-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Block leaked secret markers
        run: |
          # 仅拦截当前运行时实际可用的弱密钥（VULN-117/121）。
          # 注意：`aetherblog123` 是历史 dev DB 默认值，散布在 docker-compose.yml /
          # Makefile / config.yaml / 旧 start.sh 内，将由 VULN-118 (P1) 清理；
          # 在那之前不要把它加入此 guard 否则 CI 长期红。
          if grep -RnE 'change-me-to-a-secure-random-string|sk-proj-mock-key-for-testing|default-secret-for-dev-only-change-in-prod' \
              --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.venv \
              --exclude-dir=dist --exclude-dir=.next --exclude-dir=__pycache__ \
              --exclude-dir=bin \
              --exclude='*.md' \
              --exclude='ci-cd.yml' \
              .; then
            echo "::error::Leaked default secret markers detected — replace with empty placeholders in .env.example."
            exit 1
          fi
          echo "✅ No production-grade default secrets present in tracked source"

  # ===========================================================================
  # Docker 配置验证 (与 detect-changes 并行)
  # ===========================================================================
  config-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose files
        env:
          POSTGRES_PASSWORD: ci-validate-dummy
          JWT_SECRET: ci-validate-dummy
          AI_INTERNAL_SERVICE_TOKEN: ci-validate-dummy-token-minimum-32chars
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.prod.yml config --quiet
          echo "✅ Docker Compose files are valid"

  # ===========================================================================
  # 前端质量检查: lint + typecheck (仅当前端代码变更时)
  # PR 阶段到此为止，不跑 build
  # ===========================================================================
  frontend-quality:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: |
          pnpm --filter @aetherblog/admin typecheck
          pnpm --filter @aetherblog/blog typecheck

  # ===========================================================================
  # 后端测试 (仅当后端代码变更时)
  # ===========================================================================
  backend-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: apps/server-go/go.sum

      - name: Build
        working-directory: apps/server-go
        run: go build ./...

      - name: Run tests
        working-directory: apps/server-go
        run: go test ./... -v -count=1

  # ===========================================================================
  # AI 服务测试 (仅当 AI 服务代码变更时)
  # ===========================================================================
  ai-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.ai-service == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install dependencies
        working-directory: apps/ai-service
        run: pip install -r requirements.txt

      - name: Python syntax check
        working-directory: apps/ai-service
        run: |
          python -m py_compile app/main.py
          find app -name "*.py" -exec python -m py_compile {} \;

      - name: Run linting
        working-directory: apps/ai-service
        run: |
          pip install ruff
          ruff check .

      - name: Verify app can start
        working-directory: apps/ai-service
        env:
          AI_ENV: test
          AI_MOCK_MODE: "true"
          JWT_SECRET: "ci-test-secret"
          AI_INTERNAL_SERVICE_TOKEN: "ci-test-token-minimum-32-characters-long"
          POSTGRES_DSN: "postgresql://test:test@localhost:5432/test_db"
          # VULN-056: AI service refuses to start without an encryption key set.
          # Generated once with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
          AI_CREDENTIAL_ENCRYPTION_KEYS: "RyzpKxpEEIQQfvVYPjcrwgOpmRtvhMhqsobGQHTr1WI="
        run: |
          python -c "from app.main import app; print('✅ App imports successfully')"

  # ===========================================================================
  # 条件性 Docker 构建: 仅 push to main 且模块有变更时触发
  # ===========================================================================
  build-backend:
    needs: [detect-changes, backend-test]
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.detect-changes.outputs.backend == 'true') ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/aetherblog-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server-go/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=backend
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-backend:buildcache
          cache-to: |
            type=gha,scope=backend,mode=max
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-backend:buildcache,mode=max
          platforms: linux/amd64

  build-ai-service:
    needs: [detect-changes, ai-test]
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.detect-changes.outputs.ai-service == 'true') ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/aetherblog-ai-service
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/ai-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=ai-service
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-ai-service:buildcache
          cache-to: |
            type=gha,scope=ai-service,mode=max
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-ai-service:buildcache,mode=max
          platforms: linux/amd64

  build-blog:
    needs: [detect-changes, frontend-quality]
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.detect-changes.outputs.blog == 'true') ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/aetherblog-blog
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/blog/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 双缓存策略: GHA 缓存用于 CI 增量构建加速, registry 缓存用于持久备份
          cache-from: |
            type=gha,scope=blog
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-blog:buildcache
          cache-to: |
            type=gha,scope=blog,mode=max
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-blog:buildcache,mode=max
          platforms: linux/amd64

  build-admin:
    needs: [detect-changes, frontend-quality]
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.detect-changes.outputs.admin == 'true') ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/aetherblog-admin
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=admin
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-admin:buildcache
          cache-to: |
            type=gha,scope=admin,mode=max
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/aetherblog-admin:buildcache,mode=max
          platforms: linux/amd64

  # ===========================================================================
  # 自动部署到服务器 (Webhook 触发)
  # ===========================================================================
  deploy:
    needs: [detect-changes, config-validate, build-backend, build-ai-service, build-blog, build-admin]
    # 即使部分 build job 被跳过也能运行，但至少有一个模块被构建才触发部署
    if: |
      always() &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push' &&
        needs.detect-changes.outputs.any_changed == 'true') ||
        startsWith(github.ref, 'refs/tags/v')
      ) &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compute changed services
        id: services
        run: |
          SERVICES=""
          [[ "${{ needs.detect-changes.outputs.backend }}" == "true" ]] && SERVICES="$SERVICES backend"
          [[ "${{ needs.detect-changes.outputs.ai-service }}" == "true" ]] && SERVICES="$SERVICES ai-service"
          [[ "${{ needs.detect-changes.outputs.blog }}" == "true" ]] && SERVICES="$SERVICES blog"
          [[ "${{ needs.detect-changes.outputs.admin }}" == "true" ]] && SERVICES="$SERVICES admin"

          # Tag 推送 → 全量部署
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            SERVICES="backend ai-service blog admin"
          fi

          # 任何应用变更都要重启 gateway（nginx 路由可能受影响）
          if [ -n "$SERVICES" ]; then
            SERVICES="$SERVICES gateway"
          fi

          echo "services=$(echo $SERVICES | xargs)" >> $GITHUB_OUTPUT

      - name: Print deployment info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 增量部署 - 仅重启变更的服务:"
          echo "  📦 ${{ steps.services.outputs.services }}"
          echo "  🛡️ 中间件 (postgres/redis) 不受影响"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Trigger deployment webhook
        run: |
          set -euo pipefail

          response_file=$(mktemp)
          http_code=$(curl -sS -X POST \
            --max-time 900 \
            --connect-timeout 10 \
            --retry 2 \
            --retry-delay 2 \
            --retry-connrefused \
            -H "Content-Type: application/json" \
            -d '{"services": "${{ steps.services.outputs.services }}"}' \
            -o "$response_file" \
            -w "%{http_code}" \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}")

          echo "Webhook HTTP status: $http_code"
          echo "Webhook response:"
          cat "$response_file"

          if [ "$http_code" != "200" ]; then
            echo "❌ Deployment failed, webhook status: $http_code"
            exit 1
          fi

          echo "✅ Deployment completed successfully"
