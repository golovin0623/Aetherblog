# =============================================================================
# AetherBlog 生产环境 Docker Compose
# =============================================================================
# 
# 使用方法 (本地构建):
#   docker-compose -f docker-compose.prod.yml up -d --build
#
# 使用方法 (从 Docker Hub 拉取):
#   DOCKER_REGISTRY=golovin0623 docker-compose -f docker-compose.prod.yml up -d
#
# 端口映射:
#   - 7899: 统一入口网关 (Nginx) ← 推荐使用此端口访问
#   - 7893: 博客前端直接访问 (可选)
#   - 7894: 管理后台直接访问 (可选)
#   - 7895: PostgreSQL
#
# 访问方式:
#   - 博客: http://yourdomain:7896/
#   - 后台: http://yourdomain:7896/admin
#   - API:  http://yourdomain:7896/api
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Gateway (统一入口)
  # ---------------------------------------------------------------------------
  
  gateway:
    image: nginx:alpine
    container_name: aetherblog-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-7899}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
    depends_on:
      - blog
      - admin
      - backend
      - ai-service
    networks:
      - aetherblog-network
    # SECURITY (VULN-123): runtime hardening — disable privilege escalation,
    # drop all capabilities except those explicitly needed, disallow writes to
    # the root FS except designated tmpfs paths.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE  # required to bind :80
    read_only: true
    tmpfs:
      - /tmp:rw,size=16M,mode=1777
      - /var/cache/nginx:rw,size=16M,mode=0755
      - /var/run:rw,size=4M,mode=0755
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # ---------------------------------------------------------------------------
  # 数据库服务
  # ---------------------------------------------------------------------------
  
  # PostgreSQL 17 with pgvector (AI功能必需)
  postgres:
    image: pgvector/pgvector:pg17
    container_name: aetherblog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aetherblog
      POSTGRES_USER: aetherblog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
    ports:
      # VULN-122 回退：恢复对外端口暴露以支持远程 DBA / 跨主机访问。
      # 运维侧必须通过 host 防火墙 + pg_hba.conf 限制来源 IP；若部署拓扑是
      # 单机自用，推荐改为 "127.0.0.1:${POSTGRES_PORT:-7895}:5432"。
      - "${POSTGRES_PORT:-7895}:5432"
    volumes:
      - aetherblog_postgres_data:/var/lib/postgresql/data
    networks:
      - aetherblog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetherblog -d aetherblog"]
      interval: 3s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis (可选，添加 --profile with-redis 启动内置 Redis)
  # 如果使用外部 Redis，设置 REDIS_HOST 和 REDIS_PORT 环境变量
  redis:
    image: redis:7.2-alpine
    container_name: aetherblog-redis
    restart: unless-stopped
    # SECURITY (VULN-119): REDIS_PASSWORD 必填。旧版 sh -c 条件 fallback 让
    # 未设密码时无认证启动，任何可达容器网络的组件都能读取 cache / rate-limit
    # key / session blob。单行 `redis-server --requirepass $REDIS_PASSWORD`
    # 由 compose 变量替换注入，无需 sh wrapper。
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD env var is required}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD env var is required}
    profiles:
      - with-redis
    ports:
      # VULN-122 回退：Redis 仍设 requirepass，外部访问者须持密码；网络隔离
      # 交给 host 防火墙。若单机自用，推荐改为 "127.0.0.1:${REDIS_PORT:-6379}:6379"。
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - aetherblog-network
    healthcheck:
      # SECURITY (VULN-147): use REDISCLI_AUTH env var rather than -a flag.
      # -a flag leaks the password into `ps auxf` output; REDISCLI_AUTH is
      # consumed internally by redis-cli without appearing in process args.
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M


  # ---------------------------------------------------------------------------
  # 应用服务
  # ---------------------------------------------------------------------------

  backend:
    image: ${DOCKER_REGISTRY:-}${DOCKER_REGISTRY:+/}aetherblog-backend:${VERSION:-latest}
    build:
      context: .
      dockerfile: apps/server-go/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: aetherblog-backend
    restart: unless-stopped
    expose:
      - "8080"
    # 注意: 不暴露 8080 到宿主机，仅通过 Docker 内部网络访问
    # 如需直接访问后端，可启用下面的配置:
    # ports:
    #   - "127.0.0.1:8081:8080"
    environment:
      AETHERBLOG_DATABASE_HOST: postgres
      AETHERBLOG_DATABASE_PORT: 5432
      AETHERBLOG_DATABASE_USER: aetherblog
      AETHERBLOG_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
      AETHERBLOG_DATABASE_DBNAME: aetherblog
      AETHERBLOG_DATABASE_SSLMODE: disable
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AETHERBLOG_AI_BASE_URL: http://ai-service:8000
      AETHERBLOG_AI_INTERNAL_SERVICE_TOKEN: ${AI_INTERNAL_SERVICE_TOKEN:?AI_INTERNAL_SERVICE_TOKEN env var is required}
      # SECURITY (VULN-120): JWT_SECRET required, no silent empty fallback.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required (min 32 chars)}
      AETHERBLOG_AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AETHERBLOG_AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Strict}
      AETHERBLOG_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:7899,http://127.0.0.1:7899}
      AETHERBLOG_UPLOAD_PATH: /app/uploads
      AETHERBLOG_LOG_PATH: /app/logs
    volumes:
      - aetherblog_uploads:/app/uploads
      - aetherblog_logs:/app/logs
      # Docker socket is mounted read-only so the admin "容器监控" panel
      # (apps/server-go/internal/service/container_monitor.go) can call the
      # Docker API for container list / stats. The handler is gated behind
      # /v1/admin/monitor/* (admin-only JWT) and only issues GETs.
      #
      # SECURITY TRADEOFF: even a :ro bind of docker.sock grants root-equivalent
      # access to the host via the Docker daemon API — the ":ro" only blocks
      # writing to the *socket file* itself, not the API surface. We accept
      # this for the self-hosted admin-only monitoring use case. For hardened
      # deployments, swap to a docker-socket-proxy (tecnativa/docker-socket-proxy)
      # that restricts the API to /containers/json and /containers/*/stats.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # The backend image runs as UID 1001 (non-root). /var/run/docker.sock on
    # the host is typically owned by root:docker (mode 0660), so UID 1001 must
    # be in the host's docker group to read it. DOCKER_GID must match the
    # host's docker group — check with: `stat -c '%g' /var/run/docker.sock`.
    # Default 999 covers Ubuntu/Debian; set DOCKER_GID in .env if different.
    group_add:
      - "${DOCKER_GID:-999}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aetherblog-network
    # SECURITY (VULN-123): Go backend only writes to /app/uploads and /app/logs,
    # both already mapped to named volumes. Read-only root FS prevents malware
    # from dropping persistent binaries in / after an exploit.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=32M,mode=1777
    healthcheck:
      test: ["CMD", "/app/server", "-health"]
      interval: 3s
      timeout: 3s
      retries: 3
      # SECURITY (VULN-150): give the app time to actually boot before the
      # healthcheck reports failure; 1s was masking crash loops as "healthy yet".
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  ai-service:
    image: ${DOCKER_REGISTRY:-}${DOCKER_REGISTRY:+/}aetherblog-ai-service:${VERSION:-latest}
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: aetherblog-ai-service
    restart: unless-stopped
    expose:
      - "8000"
    # 注意: 不暴露 8000 到宿主机，仅通过 Docker 内部网络访问
    environment:
      AI_ENV: prod
      AI_HOST: 0.0.0.0
      AI_PORT: 8000
      AI_LOG_LEVEL: info
      AI_MOCK_MODE: ${AI_MOCK_MODE:-false}
      AI_JWT_MODE: ${AI_JWT_MODE:-HMAC}
      # SECURITY (VULN-120): JWT_SECRET required, no silent empty fallback.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required (min 32 chars)}  # AI 服务与后端共用同一个密钥
      AI_JWT_JWKS_URL: ${AI_JWT_JWKS_URL:-}
      AI_JWT_ISSUER: ${AI_JWT_ISSUER:-}
      AI_JWT_AUDIENCE: ${AI_JWT_AUDIENCE:-}
      AI_INTERNAL_SERVICE_TOKEN: ${AI_INTERNAL_SERVICE_TOKEN:?AI_INTERNAL_SERVICE_TOKEN env var is required}
      # SECURITY (VULN-056): credential encryption key — must be independent of JWT_SECRET.
      AI_CREDENTIAL_ENCRYPTION_KEYS: ${AI_CREDENTIAL_ENCRYPTION_KEYS:?AI_CREDENTIAL_ENCRYPTION_KEYS env var is required}
      REDIS_URL: ${AI_REDIS_URL:-redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0}
      POSTGRES_DSN: postgresql://aetherblog:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}@postgres:5432/aetherblog
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      AI_LOG_PATH: /app/logs
    volumes:
      - aetherblog_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aetherblog-network
    # SECURITY (VULN-123): same hardening as Go backend. Python needs /tmp for
    # ephemeral buffers (uvicorn reload isn't in use here; standard tmpfs size
    # suffices for logs/compilation caches).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=64M,mode=1777
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  blog:
    image: ${DOCKER_REGISTRY:-}${DOCKER_REGISTRY:+/}aetherblog-blog:${VERSION:-latest}
    build:
      context: .
      dockerfile: apps/blog/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
      args:
        # SECURITY (VULN-144): bake a relative `/api` path — the production
        # gateway already proxies /api to the backend, so the client never
        # sees the internal hostname. Baking `http://backend:8080` into the
        # bundle would ship that internal DNS name to every visitor's browser
        # (leaks topology + confuses clients when DNS differs).
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_ADMIN_URL: /admin/
    container_name: aetherblog-blog
    restart: unless-stopped
    ports:
      # VULN-122 回退：允许外部直连博客端口（用于独立域名直挂 / CDN 源站）。
      # 生产推荐仅暴露网关，此端口仅为 fallback。
      - "${BLOG_PORT:-7893}:3000"
    expose:
      - "3000"
    environment:
      API_URL: http://backend:8080
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aetherblog-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  admin:
    image: ${DOCKER_REGISTRY:-}${DOCKER_REGISTRY:+/}aetherblog-admin:${VERSION:-latest}
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: aetherblog-admin
    restart: unless-stopped
    ports:
      # VULN-122 回退：允许外部直连 admin 端口（独立域名 / 内网管理直达）。
      # VULN-124 保留：容器侧仍用 unprivileged nginx:8080。
      - "${ADMIN_PORT:-7894}:8080"
    expose:
      - "8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aetherblog-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

# ---------------------------------------------------------------------------
# 数据卷
# ---------------------------------------------------------------------------

volumes:
  aetherblog_postgres_data:
    name: aetherblog_postgres_data

  aetherblog_uploads:
    name: aetherblog_uploads
  aetherblog_logs:
    name: aetherblog_logs

# ---------------------------------------------------------------------------
# 网络
# ---------------------------------------------------------------------------

networks:
  aetherblog-network:
    driver: bridge
