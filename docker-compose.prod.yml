# =============================================================================
# AetherBlog 生产环境 Docker Compose
# =============================================================================
# 
# 使用方法 (本地构建):
#   docker-compose -f docker-compose.prod.yml up -d --build
#
# 使用方法 (从 Docker Hub 拉取):
#   DOCKER_REGISTRY=golovin0623 docker-compose -f docker-compose.prod.yml up -d
#
# 端口映射:
#   - 7899: 统一入口网关 (Nginx) ← 推荐使用此端口访问
#   - 7893: 博客前端直接访问 (可选)
#   - 7894: 管理后台直接访问 (可选)
#   - 7895: PostgreSQL
#
# 访问方式:
#   - 博客: http://yourdomain:7896/
#   - 后台: http://yourdomain:7896/admin
#   - API:  http://yourdomain:7896/api
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Gateway (统一入口)
  # ---------------------------------------------------------------------------
  
  gateway:
    image: nginx:alpine
    container_name: aetherblog-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-7899}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
    depends_on:
      - blog
      - admin
      - backend
      - ai-service
    networks:
      - aetherblog-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # ---------------------------------------------------------------------------
  # 数据库服务
  # ---------------------------------------------------------------------------
  
  # PostgreSQL 17 with pgvector (AI功能必需)
  postgres:
    image: pgvector/pgvector:pg17
    container_name: aetherblog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aetherblog
      POSTGRES_USER: aetherblog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
    ports:
      # SECURITY (VULN-122): bound to localhost only. External access must go
      # through the gateway, or via SSH tunnel for DBA. Switch to 0.0.0.0 only
      # after configuring host firewall + pg_hba.conf.
      - "127.0.0.1:${POSTGRES_PORT:-7895}:5432"
    volumes:
      - aetherblog_postgres_data:/var/lib/postgresql/data
    networks:
      - aetherblog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetherblog -d aetherblog"]
      interval: 3s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis (可选，添加 --profile with-redis 启动内置 Redis)
  # 如果使用外部 Redis，设置 REDIS_HOST 和 REDIS_PORT 环境变量
  redis:
    image: redis:7.2-alpine
    container_name: aetherblog-redis
    restart: unless-stopped
    # SECURITY (VULN-119): REDIS_PASSWORD 必填。旧版 sh -c 条件 fallback 让
    # 未设密码时无认证启动，任何可达容器网络的组件都能读取 cache / rate-limit
    # key / session blob。单行 `redis-server --requirepass $REDIS_PASSWORD`
    # 由 compose 变量替换注入，无需 sh wrapper。
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD env var is required}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD env var is required}
    profiles:
      - with-redis
    ports:
      # SECURITY (VULN-122): localhost-only; gateway/backend reach Redis via
      # internal network.
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - aetherblog-network
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M


  # ---------------------------------------------------------------------------
  # 应用服务
  # ---------------------------------------------------------------------------

  backend:
    image: ${DOCKER_REGISTRY:-}${DOCKER_REGISTRY:+/}aetherblog-backend:${VERSION:-latest}
    build:
      context: .
      dockerfile: apps/server-go/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: aetherblog-backend
    restart: unless-stopped
    expose:
      - "8080"
    # 注意: 不暴露 8080 到宿主机，仅通过 Docker 内部网络访问
    # 如需直接访问后端，可启用下面的配置:
    # ports:
    #   - "127.0.0.1:8081:8080"
    environment:
      AETHERBLOG_DATABASE_HOST: postgres
      AETHERBLOG_DATABASE_PORT: 5432
      AETHERBLOG_DATABASE_USER: aetherblog
      AETHERBLOG_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
      AETHERBLOG_DATABASE_DBNAME: aetherblog
      AETHERBLOG_DATABASE_SSLMODE: disable
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AETHERBLOG_AI_BASE_URL: http://ai-service:8000
      AETHERBLOG_AI_INTERNAL_SERVICE_TOKEN: ${AI_INTERNAL_SERVICE_TOKEN:?AI_INTERNAL_SERVICE_TOKEN env var is required}
      # SECURITY (VULN-120): JWT_SECRET required, no silent empty fallback.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required (min 32 chars)}
      AETHERBLOG_AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AETHERBLOG_AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Strict}
      AETHERBLOG_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:7899,http://127.0.0.1:7899}
      AETHERBLOG_UPLOAD_PATH: /app/uploads
      AETHERBLOG_LOG_PATH: /app/logs
    volumes:
      - aetherblog_uploads:/app/uploads
      - aetherblog_logs:/app/logs
      # REMOVED for security: Docker socket mount provides root-equivalent access
      # For container monitoring, use cAdvisor or Prometheus node_exporter instead
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aetherblog-network
    healthcheck:
      test: ["CMD", "/app/server", "-health"]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 1s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  ai-service:
    image: ${DOCKER_REGISTRY:-}${DOCKER_REGISTRY:+/}aetherblog-ai-service:${VERSION:-latest}
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: aetherblog-ai-service
    restart: unless-stopped
    expose:
      - "8000"
    # 注意: 不暴露 8000 到宿主机，仅通过 Docker 内部网络访问
    environment:
      AI_ENV: prod
      AI_HOST: 0.0.0.0
      AI_PORT: 8000
      AI_LOG_LEVEL: info
      AI_MOCK_MODE: ${AI_MOCK_MODE:-false}
      AI_JWT_MODE: ${AI_JWT_MODE:-HMAC}
      # SECURITY (VULN-120): JWT_SECRET required, no silent empty fallback.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required (min 32 chars)}  # AI 服务与后端共用同一个密钥
      AI_JWT_JWKS_URL: ${AI_JWT_JWKS_URL:-}
      AI_JWT_ISSUER: ${AI_JWT_ISSUER:-}
      AI_JWT_AUDIENCE: ${AI_JWT_AUDIENCE:-}
      AI_INTERNAL_SERVICE_TOKEN: ${AI_INTERNAL_SERVICE_TOKEN:?AI_INTERNAL_SERVICE_TOKEN env var is required}
      # SECURITY (VULN-056): credential encryption key — must be independent of JWT_SECRET.
      AI_CREDENTIAL_ENCRYPTION_KEYS: ${AI_CREDENTIAL_ENCRYPTION_KEYS:?AI_CREDENTIAL_ENCRYPTION_KEYS env var is required}
      REDIS_URL: ${AI_REDIS_URL:-redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0}
      POSTGRES_DSN: postgresql://aetherblog:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}@postgres:5432/aetherblog
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      AI_LOG_PATH: /app/logs
    volumes:
      - aetherblog_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aetherblog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  blog:
    image: ${DOCKER_REGISTRY:-}${DOCKER_REGISTRY:+/}aetherblog-blog:${VERSION:-latest}
    build:
      context: .
      dockerfile: apps/blog/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
      args:
        NEXT_PUBLIC_API_URL: http://backend:8080
        NEXT_PUBLIC_ADMIN_URL: /admin/
    container_name: aetherblog-blog
    restart: unless-stopped
    ports:
      # SECURITY (VULN-122): localhost-only direct access. Public traffic flows via gateway.
      - "127.0.0.1:${BLOG_PORT:-7893}:3000"  # 可选：直接访问 (本机调试)
    expose:
      - "3000"
    environment:
      API_URL: http://backend:8080
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aetherblog-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  admin:
    image: ${DOCKER_REGISTRY:-}${DOCKER_REGISTRY:+/}aetherblog-admin:${VERSION:-latest}
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: aetherblog-admin
    restart: unless-stopped
    ports:
      # SECURITY (VULN-122): localhost-only direct access. Public traffic flows via gateway.
      - "127.0.0.1:${ADMIN_PORT:-7894}:80"  # 可选：直接访问 (本机调试)
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aetherblog-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

# ---------------------------------------------------------------------------
# 数据卷
# ---------------------------------------------------------------------------

volumes:
  aetherblog_postgres_data:
    name: aetherblog_postgres_data

  aetherblog_uploads:
    name: aetherblog_uploads
  aetherblog_logs:
    name: aetherblog_logs

# ---------------------------------------------------------------------------
# 网络
# ---------------------------------------------------------------------------

networks:
  aetherblog-network:
    driver: bridge
